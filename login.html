<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone - Login</title>
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-background">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-content">
                    <h2 class="auth-title">Welcome back!</h2>
                    <p class="auth-subtitle">We're so excited to see you again!</p>
                    
                    <form class="auth-form" id="loginForm">
                        <div class="form-group">
                            <label for="email">EMAIL OR PHONE NUMBER <span class="required">*</span></label>
                            <input type="text" id="email" name="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="password">PASSWORD <span class="required">*</span></label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        
                        <a href="#" class="forgot-password">Forgot your password?</a>
                        
                        <button type="submit" class="auth-btn">Log In</button>
                        
                        <p class="auth-footer">
                            Need an account? <a href="register.html">Register</a>
                        </p>
                    </form>
                </div>
                
                <div class="auth-qr">
                    <div class="qr-container">
                        <div class="qr-code">
                            <div class="qr-pattern"></div>
                        </div>
                    </div>
                    <h3>Log in with QR Code</h3>
                    <p>Scan this with the <strong>Discord Clone mobile app</strong> to log in instantly.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
